name: Extract iOS mPaaS SDK

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mPaaS CocoaPods Plugin
        run: |
          sh <(curl -s http://mpaas-ios.oss-cn-hangzhou.aliyuncs.com/cocoapods/installmPaaSCocoaPodsPlugin.sh)

      - name: Create Dummy Xcode Project & Config & Podfile
        run: |
          # 1. 타겟이 포함된 빈 Xcode 프로젝트 생성
          gem install xcodeproj
          ruby -e "require 'xcodeproj'; project = Xcodeproj::Project.new('mPaaS_Forensics.xcodeproj'); project.new_target(:application, 'mPaaS_Forensics', :ios); project.save"

          # 2. [수정됨] Base64가 아닌 순수 JSON 텍스트 형태로 가짜 Config 파일 생성
          cat <<EOF > dummy-dummy-iOS.config
          {
            "appId": "mPaaSForensics",
            "appKey": "dummyAppKey",
            "workspaceId": "default",
            "tenantId": "dummyTenant"
          }
          EOF

          # 3. 빈 Podfile 생성
          cat <<EOF > Podfile
          plugin "cocoapods-mPaaS"
          source 'https://gitee.com/mpaas/podspecs.git'
          source 'https://github.com/CocoaPods/Specs.git'

          platform :ios, '12.0'
          mPaaS_baseline '10.2.3'

          target 'mPaaS_Forensics' do
            use_frameworks!
            mPaaS_pod "mPaaS_DataCenter"
          end
          EOF

      - name: Download SDK via CocoaPods
        run: |
          pod mpaas update 10.2.3
          pod install

      - name: Zip the downloaded Frameworks
        run: |
          zip -r mPaaS_iOS_SDK.zip Pods/

      - name: Upload Artifact for Download
        uses: actions/upload-artifact@v4
        with:
          name: mPaaS_Official_Frameworks
          path: mPaaS_iOS_SDK.zip
          retention-days: 1
